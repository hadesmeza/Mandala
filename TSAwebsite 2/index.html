`// Two Pointers — canonical template
// Works when the array is sorted or when O(1) space is required.

public int twoPointers(int[] nums, int target) {
    int left  = 0;
    int right = nums.length - 1;

    while (left < right) {
        int sum = nums[left] + nums[right];

        if (sum == target) {
            return encode(left, right);   // found pair
        } else if (sum < target) {
            left++;                        // need larger value
        } else {
            right--;                       // need smaller value
        }
    }
    return -1; // no pair found
}

// ── 3Sum variant: fix one, run two-pointer for the rest ──
public List<List<Integer>> threeSum(int[] nums) {
    Arrays.sort(nums);
    List<List<Integer>> result = new ArrayList<>();

    for (int i = 0; i < nums.length - 2; i++) {
        if (i > 0 && nums[i] == nums[i - 1]) continue; // skip duplicates

        int left  = i + 1;
        int right = nums.length - 1;

        while (left < right) {
            int sum = nums[i] + nums[left] + nums[right];
            if      (sum == 0) { result.add(List.of(nums[i], nums[left++], nums[right--])); }
            else if (sum  < 0) { left++;  }
            else               { right--; }
        }
    }
    return result;
}`),

`// Sliding Window — variable-size template
// Key invariant: the window [left, right] always satisfies the constraint.

public int longestSubstringWithoutRepeating(String s) {
    Map<Character, Integer> charToIndex = new HashMap<>();
    int maxLength = 0;
    int left = 0;

    for (int right = 0; right < s.length(); right++) {
        char current = s.charAt(right);

        // If we've seen this char inside the current window, shrink from left
        if (charToIndex.containsKey(current)) {
            left = Math.max(left, charToIndex.get(current) + 1);
        }

        charToIndex.put(current, right);
        maxLength = Math.max(maxLength, right - left + 1);
    }
    return maxLength;
}

// ── Minimum Window Substring — need/have pattern ──
public String minWindow(String s, String t) {
    Map<Character, Integer> need = new HashMap<>();
    for (char c : t.toCharArray()) need.merge(c, 1, Integer::sum);

    int have = 0, required = need.size();
    int left = 0, minLen = Integer.MAX_VALUE, minLeft = 0;
    Map<Character, Integer> window = new HashMap<>();

    for (int right = 0; right < s.length(); right++) {
        char c = s.charAt(right);
        window.merge(c, 1, Integer::sum);

        if (need.containsKey(c) && window.get(c).equals(need.get(c))) have++;

        while (have == required) {                         // window is valid — try to shrink
            if (right - left + 1 < minLen) {
                minLen = right - left + 1;
                minLeft = left;
            }
            char leftChar = s.charAt(left++);
            window.merge(leftChar, -1, Integer::sum);
            if (need.containsKey(leftChar) && window.get(leftChar) < need.get(leftChar)) have--;
        }
    }
    return minLen == Integer.MAX_VALUE ? "" : s.substring(minLeft, minLeft + minLen);
}`),

`// ListNode definition — standard across all linked list problems
public class ListNode {
    int val;
    ListNode next;
    ListNode(int val) { this.val = val; }
}

// ── Detect cycle ──
public boolean hasCycle(ListNode head) {
    ListNode slow = head;
    ListNode fast = head;

    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
        if (slow == fast) return true;   // they met — cycle confirmed
    }
    return false;
}

// ── Find middle node ──
public ListNode findMiddle(ListNode head) {
    ListNode slow = head;
    ListNode fast = head;

    while (fast != null && fast.next != null) {
        slow = slow.next;
        fast = fast.next.next;
    }
    return slow; // slow is now at the middle
}

// ── Palindrome linked list ──
public boolean isPalindrome(ListNode head) {
    ListNode middle   = findMiddle(head);
    ListNode reversed = reverse(middle);   // reverse second half in-place
    ListNode current  = head;

    while (reversed != null) {
        if (current.val != reversed.val) return false;
        current  = current.next;
        reversed = reversed.next;
    }
    return true;
}

private ListNode reverse(ListNode head) {
    ListNode prev = null;
    while (head != null) {
        ListNode next = head.next;
        head.next = prev;
        prev = head;
        head = next;
    }
    return prev;
}`),

`// ── BFS — shortest path on an unweighted graph ──
public int shortestPath(Map<Integer, List<Integer>> graph, int source, int target) {
    Queue<Integer> queue   = new ArrayDeque<>();
    Set<Integer>   visited = new HashSet<>();

    queue.offer(source);
    visited.add(source);
    int distance = 0;

    while (!queue.isEmpty()) {
        int levelSize = queue.size();          // process one level at a time

        for (int i = 0; i < levelSize; i++) {
            int node = queue.poll();
            if (node == target) return distance;

            for (int neighbor : graph.get(node)) {
                if (!visited.contains(neighbor)) {
                    visited.add(neighbor);
                    queue.offer(neighbor);
                }
            }
        }
        distance++;
    }
    return -1; // unreachable
}

// ── DFS — number of islands (grid flood-fill) ──
public int numIslands(char[][] grid) {
    int islands = 0;
    for (int row = 0; row < grid.length; row++) {
        for (int col = 0; col < grid[0].length; col++) {
            if (grid[row][col] == '1') {
                dfsFloodFill(grid, row, col);
                islands++;
            }
        }
    }
    return islands;
}

private void dfsFloodFill(char[][] grid, int row, int col) {
    boolean outOfBounds = row < 0 || row >= grid.length || col < 0 || col >= grid[0].length;
    if (outOfBounds || grid[row][col] != '1') return;

    grid[row][col] = '0';                     // mark visited by sinking the island
    dfsFloodFill(grid, row + 1, col);
    dfsFloodFill(grid, row - 1, col);
    dfsFloodFill(grid, row, col + 1);
    dfsFloodFill(grid, row, col - 1);
}`),

`// ── Classic binary search ──
public int binarySearch(int[] nums, int target) {
    int lo = 0;
    int hi = nums.length - 1;

    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;       // avoids overflow vs (lo+hi)/2

        if      (nums[mid] == target) return mid;
        else if (nums[mid]  < target) lo = mid + 1;
        else                          hi = mid - 1;
    }
    return -1;
}

// ── Answer-space binary search — e.g. Koko Eating Bananas ──
// "Find the minimum speed k such that all piles can be eaten in h hours"
public int minEatingSpeed(int[] piles, int h) {
    int lo = 1;
    int hi = Arrays.stream(piles).max().getAsInt();

    while (lo < hi) {
        int mid = lo + (hi - lo) / 2;
        if (canFinish(piles, mid, h)) hi = mid;   // mid works — try smaller
        else                          lo = mid + 1;
    }
    return lo;
}

private boolean canFinish(int[] piles, int speed, int hoursAllowed) {
    int hoursNeeded = Arrays.stream(piles)
        .map(pile -> (int) Math.ceil((double) pile / speed))
        .sum();
    return hoursNeeded <= hoursAllowed;
}

// ── Search in rotated sorted array ──
public int searchRotated(int[] nums, int target) {
    int lo = 0, hi = nums.length - 1;

    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (nums[mid] == target) return mid;

        boolean leftHalfSorted = nums[lo] <= nums[mid];

        if (leftHalfSorted) {
            if (nums[lo] <= target && target < nums[mid]) hi = mid - 1;
            else                                          lo = mid + 1;
        } else {
            if (nums[mid] < target && target <= nums[hi]) lo = mid + 1;
            else                                          hi = mid - 1;
        }
    }
    return -1;
}`),

`// ── Kth Largest — min-heap of size K ──
// Invariant: heap always holds the K largest elements seen so far.
// heap.peek() is therefore the Kth largest.
public int findKthLargest(int[] nums, int k) {
    PriorityQueue<Integer> minHeap = new PriorityQueue<>(); // natural order = min-heap

    for (int num : nums) {
        minHeap.offer(num);
        if (minHeap.size() > k) minHeap.poll();   // evict the smallest
    }
    return minHeap.peek();                         // Kth largest remains
}

// ── Merge K Sorted Lists ──
public ListNode mergeKLists(ListNode[] lists) {
    // Order by node value — smallest value gets highest priority
    PriorityQueue<ListNode> minHeap =
        new PriorityQueue<>(Comparator.comparingInt(node -> node.val));

    // Seed heap with the head of every list
    Arrays.stream(lists)
          .filter(Objects::nonNull)
          .forEach(minHeap::offer);

    ListNode dummy = new ListNode(0);
    ListNode tail  = dummy;

    while (!minHeap.isEmpty()) {
        tail.next = minHeap.poll();
        tail = tail.next;
        if (tail.next != null) minHeap.offer(tail.next); // advance that list
    }
    return dummy.next;
}

// ── Find Median from Data Stream — two-heap approach ──
class MedianFinder {
    private final PriorityQueue<Integer> lowerHalf = new PriorityQueue<>(Comparator.reverseOrder()); // max-heap
    private final PriorityQueue<Integer> upperHalf = new PriorityQueue<>();                           // min-heap

    public void addNum(int num) {
        lowerHalf.offer(num);
        upperHalf.offer(lowerHalf.poll());          // balance: push smallest of lower into upper

        if (lowerHalf.size() < upperHalf.size()) {
            lowerHalf.offer(upperHalf.poll());       // keep lowerHalf >= upperHalf in size
        }
    }

    public double findMedian() {
        return lowerHalf.size() > upperHalf.size()
            ? lowerHalf.peek()
            : (lowerHalf.peek() + upperHalf.peek()) / 2.0;
    }
}`),

`// ── House Robber — 1D DP ──
// dp[i] = max money robbed from houses 0..i
// Either skip house i (dp[i-1]) or rob it and skip i-1 (dp[i-2] + nums[i])
public int rob(int[] nums) {
    if (nums.length == 1) return nums[0];

    int twoBack = nums[0];
    int oneBack = Math.max(nums[0], nums[1]);

    for (int i = 2; i < nums.length; i++) {
        int current = Math.max(oneBack, twoBack + nums[i]);
        twoBack = oneBack;
        oneBack = current;
    }
    return oneBack;
}

// ── Longest Common Subsequence — 2D DP ──
// dp[i][j] = LCS length of text1[0..i-1] and text2[0..j-1]
public int longestCommonSubsequence(String text1, String text2) {
    int m = text1.length(), n = text2.length();
    int[][] dp = new int[m + 1][n + 1];

    for (int i = 1; i <= m; i++) {
        for (int j = 1; j <= n; j++) {
            if (text1.charAt(i - 1) == text2.charAt(j - 1)) {
                dp[i][j] = dp[i - 1][j - 1] + 1;          // chars match — extend
            } else {
                dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]); // take best of skipping either
            }
        }
    }
    return dp[m][n];
}

// ── Coin Change — unbounded knapsack ──
// dp[amount] = fewest coins to make up 'amount'
public int coinChange(int[] coins, int amount) {
    int[] dp = new int[amount + 1];
    Arrays.fill(dp, amount + 1);   // sentinel: impossible value
    dp[0] = 0;

    for (int current = 1; current <= amount; current++) {
        for (int coin : coins) {
            if (coin <= current) {
                dp[current] = Math.min(dp[current], dp[current - coin] + 1);
            }
        }
    }
    return dp[amount] > amount ? -1 : dp[amount];
}`),

`// ── Valid Parentheses ──
public boolean isValid(String s) {
    Deque<Character> stack = new ArrayDeque<>();
    Map<Character, Character> matching = Map.of(')', '(', ']', '[', '}', '{');

    for (char c : s.toCharArray()) {
        if (!matching.containsKey(c)) {
            stack.push(c);                              // opening bracket
        } else {
            if (stack.isEmpty() || stack.peek() != matching.get(c)) return false;
            stack.pop();
        }
    }
    return stack.isEmpty();
}

// ── Daily Temperatures — monotonic decreasing stack ──
// For each day, how many days until a warmer temperature?
public int[] dailyTemperatures(int[] temperatures) {
    int[] result = new int[temperatures.length];
    Deque<Integer> stack = new ArrayDeque<>();  // stores indices, not values

    for (int today = 0; today < temperatures.length; today++) {
        // Pop days that are colder than today — today is their "next warmer day"
        while (!stack.isEmpty() && temperatures[stack.peek()] < temperatures[today]) {
            int coldDay = stack.pop();
            result[coldDay] = today - coldDay;
        }
        stack.push(today);
    }
    return result;
}

// ── Largest Rectangle in Histogram ──
public int largestRectangleArea(int[] heights) {
    Deque<Integer> stack = new ArrayDeque<>();  // monotonic increasing by height
    int maxArea = 0;
    int n = heights.length;

    for (int i = 0; i <= n; i++) {
        int currentHeight = (i == n) ? 0 : heights[i]; // sentinel forces remaining pops

        while (!stack.isEmpty() && heights[stack.peek()] > currentHeight) {
            int height = heights[stack.pop()];
            int width  = stack.isEmpty() ? i : i - stack.peek() - 1;
            maxArea = Math.max(maxArea, height * width);
        }
        stack.push(i);
    }
    return maxArea;
}`),

`// ── Combination Sum — reuse elements allowed ──
public List<List<Integer>> combinationSum(int[] candidates, int target) {
    List<List<Integer>> result = new ArrayList<>();
    Arrays.sort(candidates);
    backtrack(candidates, target, 0, new ArrayList<>(), result);
    return result;
}

private void backtrack(int[] candidates, int remaining, int start,
                       List<Integer> current, List<List<Integer>> result) {
    if (remaining == 0) {
        result.add(new ArrayList<>(current));   // copy — current is mutated
        return;
    }

    for (int i = start; i < candidates.length; i++) {
        if (candidates[i] > remaining) break;   // sorted → prune entire suffix

        current.add(candidates[i]);
        backtrack(candidates, remaining - candidates[i], i, current, result); // i, not i+1: reuse allowed
        current.remove(current.size() - 1);     // UNDO
    }
}

// ── N-Queens — constraint sets eliminate O(n) validity checks ──
public List<List<String>> solveNQueens(int n) {
    List<List<String>> result = new ArrayList<>();
    Set<Integer> cols  = new HashSet<>();
    Set<Integer> diag1 = new HashSet<>();   // row - col is constant on each diagonal
    Set<Integer> diag2 = new HashSet<>();   // row + col is constant on each anti-diagonal
    int[] queens = new int[n];              // queens[row] = col of queen in that row

    placeQueens(0, n, queens, cols, diag1, diag2, result);
    return result;
}

private void placeQueens(int row, int n, int[] queens,
                         Set<Integer> cols, Set<Integer> diag1, Set<Integer> diag2,
                         List<List<String>> result) {
    if (row == n) {
        result.add(buildBoard(queens, n));
        return;
    }

    for (int col = 0; col < n; col++) {
        if (cols.contains(col) || diag1.contains(row - col) || diag2.contains(row + col)) continue;

        cols.add(col);  diag1.add(row - col);  diag2.add(row + col);
        queens[row] = col;

        placeQueens(row + 1, n, queens, cols, diag1, diag2, result);

        cols.remove(col);  diag1.remove(row - col);  diag2.remove(row + col);  // UNDO
    }
}

private List<String> buildBoard(int[] queens, int n) {

        .mapToObj(row -> {
            char[] rowArr = new char[n];
            Arrays.fill(rowArr, '.');
            rowArr[queens[row]] = 'Q';
            return new String(rowArr);
        })
        .collect(Collectors.toList());

// ── Merge Intervals ──
public int[][] merge(int[][] intervals) {
    Arrays.sort(intervals, Comparator.comparingInt(iv -> iv[0]));

    List<int[]> merged = new ArrayList<>();
    merged.add(intervals[0]);

    for (int[] current : intervals) {
        int[] last = merged.get(merged.size() - 1);

        if (current[0] <= last[1]) {
            last[1] = Math.max(last[1], current[1]);   // extend end
        } else {
            merged.add(current);                        // no overlap — new interval

    }
    return merged.toArray(new int[0][]);

public int minMeetingRooms(int[][] intervals) {
    Arrays.sort(intervals, Comparator.comparingInt(iv -> iv[0]));

    // Min-heap tracks end times of ongoing meetings
    PriorityQueue<Integer> endTimes = new PriorityQueue<>();

    for (int[] meeting : intervals) {
        if (!endTimes.isEmpty() && endTimes.peek() <= meeting[0]) {
            endTimes.poll();   // a room freed up — reuse it
        }
        endTimes.offer(meeting[1]);
    }
    return endTimes.size();    // rooms still occupied = rooms needed

class Trie {

    private static class TrieNode {
        Map<Character, TrieNode> children = new HashMap<>();
        boolean isEnd = false;
    }

    private final TrieNode root = new TrieNode();

    public void insert(String word) {
        TrieNode current = root;
        for (char c : word.toCharArray()) {
            current = current.children.computeIfAbsent(c, k -> new TrieNode());
        }
        current.isEnd = true;
    }

    public boolean search(String word) {
        TrieNode node = findNode(word);
        return node != null && node.isEnd;
    }

    public boolean startsWith(String prefix) {
        return findNode(prefix) != null;
    }

    // Shared traversal logic — avoids code duplication
    private TrieNode findNode(String prefix) {
        TrieNode current = root;
        for (char c : prefix.toCharArray()) {
            current = current.children.get(c);
            if (current == null) return null;
        }
        return current;
    }
}

// ── Wildcard search — '.' matches any character ──
public boolean searchWithWildcard(TrieNode node, String word, int index) {
    if (index == word.length()) return node.isEnd;

    char c = word.charAt(index);

    if (c == '.') {
        // Try every possible child
        return node.children.values().stream()
            .anyMatch(child -> searchWithWildcard(child, word, index + 1));
    } else {
        TrieNode next = node.children.get(c);
        return next != null && searchWithWildcard(next, word, index + 1);
    }
}`),

`// ── Topological Sort — Kahn's BFS ──
public int[] findOrder(int numCourses, int[][] prerequisites) {
    int[] inDegree = new int[numCourses];
    List<List<Integer>> graph = new ArrayList<>();
    IntStream.range(0, numCourses).forEach(i -> graph.add(new ArrayList<>()));

    for (int[] prereq : prerequisites) {
        graph.get(prereq[1]).add(prereq[0]);
        inDegree[prereq[0]]++;
    }

    Queue<Integer> queue = IntStream.range(0, numCourses)
        .filter(i -> inDegree[i] == 0)
        .boxed()
        .collect(Collectors.toCollection(ArrayDeque::new));

    int[] order = new int[numCourses];
    int index = 0;

    while (!queue.isEmpty()) {
        int course = queue.poll();
        order[index++] = course;

        for (int next : graph.get(course)) {
            if (--inDegree[next] == 0) queue.offer(next);
        }
    }
    return index == numCourses ? order : new int[0]; // empty = cycle detected
}

// ── Union-Find with path compression + union by rank ──
class UnionFind {
    private final int[] parent;
    private final int[] rank;

    UnionFind(int n) {
        parent = IntStream.range(0, n).toArray(); // each node is its own parent
        rank   = new int[n];
    }

    int find(int x) {
        if (parent[x] != x) parent[x] = find(parent[x]); // path compression
        return parent[x];
    }

    boolean union(int x, int y) {
        int rootX = find(x), rootY = find(y);
        if (rootX == rootY) return false;          // already in same set — cycle!

        if (rank[rootX] < rank[rootY]) parent[rootX] = rootY;
        else if (rank[rootX] > rank[rootY]) parent[rootY] = rootX;
        else { parent[rootY] = rootX; rank[rootX]++; }
        return true;
    }
}`),

// ─────────────────────────────────────────────
//  Syntax highlighter — simple token-based
// ─────────────────────────────────────────────
function highlightJava(code) {
  const keywords = /\b(public|private|class|record|new|return|if|else|for|while|break|continue|void|int|boolean|char|double|static|final|null|true|false|this)\b/g;
  const types    = /\b(List|Map|Set|Queue|Deque|PriorityQueue|ArrayDeque|ArrayList|HashMap|HashSet|String|Integer|Character|Arrays|Collections|IntStream|Comparator|Optional|Objects)\b/g;
  const comments = /(\/\/[^\n]*)/g;
  const strings  = /("[^"]*")/g;

  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(strings,  '<span class="st">$1</span>')
    .replace(comments, '<span class="cm">$1</span>')
    .replace(keywords, '<span class="kw">$1</span>')
    .replace(types,    '<span class="tp">$1</span>');
}
